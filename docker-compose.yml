services:
  qdrant:
    image: qdrant/qdrant
    container_name: dex_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  embeddings:
    build:
      context: ./services/embeddings
      dockerfile: Dockerfile
    container_name: dex_embeddings
    ports:
      - "8001:8001"
    volumes:
      - ./data/models:/models
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: dex_searxng
    ports:
      - "8080:8080"
    volumes:
      - ./data/searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=Dex Search
    restart: unless-stopped

volumes:
  embeddings_cache: